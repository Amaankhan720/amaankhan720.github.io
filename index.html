<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Verification</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-color: #3498db;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #container {
            text-align: center;
            transition: opacity 0.5s ease;
        }

        .fade-in {
            animation: fadeIn 1.5s ease-in-out;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .pulse {
            font-size: 1.2rem;
            color: #888;
            animation: pulse-animation 2s infinite;
            cursor: default;
        }

        /* Loading Spinner */
        #loader {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse-animation {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .pulse { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="container" class="fade-in">
        <div id="prompt-screen">
            <h1>Secure Portal Access</h1>
            <p class="pulse">Press Enter to continue</p>
        </div>

        <div id="loader">
            <div class="spinner"></div>
            <p>Decrypting session...</p>
        </div>
    </div>

    <script>
        const promptScreen = document.getElementById('prompt-screen');
        const loader = document.getElementById('loader');
        let triggered = false;

        const initiateRedirect = () => {
            if (triggered) return;
            triggered = true;

            // Switch UI to loading state
            promptScreen.style.display = 'none';
            loader.style.display = 'flex';

            // Short delay for "authenticity" before the Rickroll
            setTimeout(() => {
                window.location.href = "https://social.mtdv.me/videos/F5egG90I0r";
            }, 1800);
        };

        // Listen for Enter key
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                initiateRedirect();
            }
        });

        // Mobile fallback: allow clicking the screen
        document.addEventListener('touchstart', () => {
            initiateRedirect();
        });
    </script>
</body>
</html>
